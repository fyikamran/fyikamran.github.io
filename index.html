---
layout: default
title: "Home"
---

<div class="vertical">
  <div class="vertical-label">Recent Writing</div>
  <ul class="blog-list">
    {% if site.posts.size > 0 %}
      {% for post in site.posts %}
        <li class="blog-item">
          <span class="blog-date">{{ post.date | date: "%B %d, %Y" }}</span>
          <a class="blog-link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    {% else %}
      <p class="vertical-desc" style="font-style: italic; color: #555555;">Articles coming soon...</p>
    {% endif %}
  </ul>
</div>
