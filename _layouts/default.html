<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  {% seo %}
 <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:     #f7f5f0;
–ink:    #1a1814;
–muted:  #3d3a34;
–light:  #e0ddd6;
–accent: #2d6a4f;
}

html, body { height: 100%; overflow: hidden; }

body {
background: var(–bg);
color: var(–ink);
font-family: ‘DM Sans’, sans-serif;
font-weight: 300;
max-width: 520px;
margin: 0 auto;
padding: 0 28px;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
height: 100%;
display: flex;
flex-direction: column;
justify-content: center;
}

/* ── Logo ── */
.logo-mark { margin-bottom: 20px; }

.logo-fyi {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(–accent);
display: block;
margin-bottom: 4px;
}

.logo-name {
font-family: ‘Playfair Display’, serif;
font-size: 44px;
font-weight: 500;
color: var(–ink);
line-height: 1;
display: block;
}

.verticals {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.15em;
color: var(–ink);
margin-bottom: 6px;
}

.tagline {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 16px;
color: var(–ink);
margin-bottom: 40px;
}

/* ── Verticals ── */
.vertical { margin-bottom: 26px; }

.vertical-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.22em;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 4px;
display: flex;
align-items: center;
gap: 12px;
}

.vertical-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–light);
}

.vertical-desc {
font-size: 14px;
color: var(–muted);
line-height: 1.65;
}

/* ── Social icons ── */
.social {
display: flex;
align-items: center;
justify-content: center;
gap: 36px;
margin-top: 32px;
}

.social a {
display: flex;
align-items: center;
justify-content: center;
color: var(–ink);
transition: color 0.15s;
text-decoration: none;
}

.social a:hover { color: var(–accent); }

.social a, .social a:visited { color: #1a1814; }
.social a svg {
width: 22px;
height: 22px;
fill: currentColor;
display: block;
}

/* ── Footer ── */
footer {
margin-top: 28px;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.1em;
color: var(–muted);
text-align: center;
}
</style>
</head>
<body>
  {% include header.html %}
    <header class="header">
      <a href="/" class="logo">fyi kamran</a>
    </header>
    
    <main>
      <div class="post-content">
        {{ content }}
      </div>
    </main>

  <!-- The Core Page Content -->
  <main class="post-content">
    <article>
     {{ content }}
    </article>
  </main>
  
  {% include footer.html %}
</body>
      
</html>
