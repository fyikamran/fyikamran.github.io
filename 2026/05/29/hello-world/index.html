  }

    font-style: italic;
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 40px;
  }

  /* ── Verticals & Blog Lists ── */
  .vertical { margin-bottom: 26px; }

  .vertical-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

    content: '';
    flex: 1;
    height: 1px;
    background: var(--light);

    color: var(--muted);

  }

    margin-bottom: 12px;
    font-size: 14px;

    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--light);
    transition: border-color 0.15s;
  }

  .blog-link:hover {
    border-color: var(--accent);
  }

  .blog-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: block;
  }

  /* ── Social icons ── */
  .social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 36px;
    margin-top: 32px;
  }

  .social a {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: color 0.15s;
    text-decoration: none;
  }

  .social a:hover { color: var(--accent); }
  .social a, .social a:visited { color: #1a1814; }
  .social a svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
    display: block;
  }
